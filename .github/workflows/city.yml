# Generates profile-3d-city.svg via lowlighter/metrics. Needs secret METRICS_TOKEN.

name: 3D city (isometric calendar)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: profile-3d-city.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
